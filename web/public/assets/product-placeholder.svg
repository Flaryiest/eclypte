  </defs>
  <rect width="360" height="640" fill="url(#bg)"/>
  <rect width="360" height="640" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="359" height="639" fill="none" stroke="#e8a838" stroke-width="1" stroke-dasharray="6 6" opacity="0.5"/>
  <g fill="#e8a838" font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">
    <text x="180" y="310" font-size="22" font-weight="600" letter-spacing="2">PRODUCT</text>
    <text x="180" y="340" font-size="14" opacity="0.7" letter-spacing="3">9 : 16</text>
